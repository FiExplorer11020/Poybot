<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POYBOT v2 // POLYMARKET TRADING TERMINAL</title>
  <link rel="icon" href="data:,">
  <meta name="theme-color" content="#070809">

  <!-- Fonts: Fira Code (mono) + Fira Sans (sans). Skill-recommended
       "Dashboard Data" pairing for analytics/admin panels. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Design tokens (single source of truth — see docs/UI_REDESIGN_PHASE3.md § 12.2.C) -->
  <link rel="stylesheet" href="/static/dashboard/v2/tokens.css">

  <!-- React 18 + Babel via CDN. Same loading pattern as v1 — no bundler. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root">
    <div role="status" aria-live="polite" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:var(--text-tertiary);font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;">
      <div style="color:var(--accent-amber);font-weight:700;font-size:13px;">POLYMARKET TRADING BOT</div>
      <div>LOADING v2 INTERFACE&hellip;</div>
      <span class="spinner" aria-hidden="true"></span>
    </div>
  </div>

  <!-- Reuse the existing live data client from v1 — same WS bridge -->
  <script src="/static/dashboard/api-client.js"></script>

  <!-- Babel-transform the three v2 JSX modules in order -->
  <script>
  (async function () {
    const root = document.getElementById('root');

    function showError(msg) {
      root.innerHTML =
        '<pre style="color:var(--status-err);padding:24px;font-size:11px;white-space:pre-wrap;font-family:var(--font-mono)">LOAD ERROR:\n' +
        msg + '</pre>';
    }

    try {
      const files = [
        '/static/dashboard/v2/dashboard-components.jsx',
        '/static/dashboard/v2/dashboard-app.jsx',
        '/static/dashboard/v2/dashboard-tabs.jsx',
      ];

      const sources = await Promise.all(
        files.map(async (path) => {
          const r = await fetch(path);
          if (!r.ok) throw new Error('Failed to fetch ' + path + ' (HTTP ' + r.status + ')');
          return await r.text();
        })
      );

      // Each module wrapped in its own IIFE so const decls don't collide.
      const wrapped = sources
        .map((src) => '(function() {\n' + src + '\n})();')
        .join('\n\n');

      const code = Babel.transform(wrapped, {
        presets: ['react'],
      }).code;

      // eslint-disable-next-line no-new-func
      new Function(code)();
    } catch (e) {
      showError((e && e.stack) ? e.stack : String(e));
    }
  })();
  </script>
</body>
</html>
