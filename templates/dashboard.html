<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POYBOT // POLYMARKET TRADING TERMINAL</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<!--
  PLAN-UIA-001 (2026-05-18) — V1 source of truth. V2 dashboard files are
  ONLY loaded when localStorage.poybot_v2_lab === '1' (toggle inside the
  LAB tab). This keeps the page weight light and prevents the V2 portfolio
  from silently rebinding window.LivePortfolio on cold load.
  See memory: project_v1_vs_v2_terminal.md.

  Babel is NOT loaded here. The V1 dashboard ships precompiled at
  /static/dashboard/dist/dashboard.bundle.js (see scripts/build_dashboard.mjs).
  When V2 lab is enabled, Babel is injected on-demand below.
-->
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #070809; color: #c4ccd8; font-family: 'JetBrains Mono','Menlo','Consolas',monospace; font-size: 12px; line-height: 1.4; overflow: hidden; -webkit-font-smoothing: antialiased; }
  #root { height: 100vh; display: flex; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #070809; }
  ::-webkit-scrollbar-thumb { background: #252d3e; }
  input, select, button, textarea { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #c4ccd8; }
  input::placeholder { color: #6b7a94; }
  select option { background: #101318; }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.012); }
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#6b7a94;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;">
    <div style="color:#e8a020;font-weight:700;font-size:13px;">POLYMARKET TRADING BOT</div>
    <div>LOADING INTERFACE…</div>
  </div>
</div>

<!--
  V1 dashboard — precompiled bundle. Always loaded.
  Build via: npm run build  (esbuild → static/dashboard/dist/dashboard.bundle.js)

  Dev fallback: if the bundle is missing (e.g. you cloned and haven't built yet)
  we fall back to the legacy runtime-Babel path so the dashboard still works.
-->
<script>
(async function () {
  const root = document.getElementById('root');

  function showError(msg) {
    root.innerHTML =
      '<pre style="color:#c93545;padding:24px;font-size:11px;white-space:pre-wrap;font-family:monospace">LOAD ERROR:\n' +
      msg + '</pre>';
  }

  // Try the precompiled bundle first. Fall back to runtime Babel if missing.
  try {
    const r = await fetch('/static/dashboard/dist/dashboard.bundle.js', { method: 'HEAD' });
    if (r.ok) {
      // Bundle exists — inject and let it run.
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = '/static/dashboard/dist/dashboard.bundle.js';
        s.defer = false;  // need it to run before V2 lab init below
        s.onload = res;
        s.onerror = () => rej(new Error('bundle load failed'));
        document.body.appendChild(s);
      });
    } else {
      throw new Error('bundle missing');
    }
  } catch (_bundleErr) {
    // Dev fallback — runtime Babel.
    try {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/@babel/standalone@7.29.0/babel.min.js';
        s.crossOrigin = 'anonymous';
        s.onload = res;
        s.onerror = rej;
        document.head.appendChild(s);
      });

      const files = [
        '/static/dashboard/api-client.js',
        '/static/dashboard/dashboard-components.jsx',
        '/static/dashboard/dashboard-tabs.jsx',
        '/static/dashboard/dashboard-app.jsx',
      ];
      let combined = '';
      for (const f of files) {
        const res = await fetch(f);
        if (!res.ok) throw new Error('Failed to load ' + f + ': HTTP ' + res.status);
        const text = await res.text();
        combined += '\n// ===== ' + f + ' =====\n;(function(){\n' + text + '\n})();\n';
      }
      const code = Babel.transform(combined, { presets: ['react'], filename: 'app.jsx' }).code;
      // eslint-disable-next-line no-new-func
      new Function(code)();
    } catch (e) {
      console.error('[Poybot] V1 dev fallback failed:', e);
      showError(e.message || String(e));
      return;
    }
  }

  // ── V2 lab overlay ─────────────────────────────────────────────────────
  // Only loaded when the operator explicitly opted in via the LAB tab.
  // See memory: project_v1_vs_v2_terminal.md ("V1 = source of truth ;
  // V2 = lab gated OFF, ne pas migrer").
  if (localStorage.getItem('poybot_v2_lab') !== '1') return;

  document.title = '⚗ POYBOT // V2 LAB MODE';

  // Wait until V1 has booted React (window.LiveStore + window.LivePortfolio
  // must exist before V2 rebinds them — otherwise the rebind no-ops).
  await new Promise(res => {
    if (window.LiveStore && window.LivePortfolio) return res();
    const id = setInterval(() => {
      if (window.LiveStore && window.LivePortfolio) { clearInterval(id); res(); }
    }, 50);
  });

  try {
    // Inject CSS + heavy CDN deps now (not on cold load).
    const head = document.head;
    const css = document.createElement('link');
    css.rel = 'stylesheet';
    css.href = '/static/dashboard/v2/theme.css';
    head.appendChild(css);

    // Ensure Babel is loaded (if we hit the dev-fallback path above, it
    // already is; if we went via the bundle path, we still need it for
    // the runtime-transformed V2 JSX).
    if (!window.Babel) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/@babel/standalone@7.29.0/babel.min.js';
        s.crossOrigin = 'anonymous';
        s.onload = res; s.onerror = rej;
        head.appendChild(s);
      });
    }
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js';
      s.crossOrigin = 'anonymous';
      s.onload = res; s.onerror = rej;
      head.appendChild(s);
    });
    // Cosmograph is an ESM module — load via a dynamic <script type=module>.
    const cosmoScript = document.createElement('script');
    cosmoScript.type = 'module';
    cosmoScript.textContent = `
      import { Cosmograph } from 'https://esm.sh/@cosmograph/cosmograph@1.4.2';
      window.Cosmograph = Cosmograph;
      window.__cosmographReady = true;
      window.dispatchEvent(new Event('cosmograph:ready'));
    `;
    head.appendChild(cosmoScript);

    const v2Files = [
      '/static/dashboard/v2/WalletGraph.jsx',
      '/static/dashboard/v2/components/primitives/Panel.jsx',
      '/static/dashboard/v2/components/primitives/Pill.jsx',
      '/static/dashboard/v2/components/primitives/Stat.jsx',
      '/static/dashboard/v2/components/primitives/StatusPill.jsx',
      '/static/dashboard/v2/components/primitives/Sparkline.jsx',
      '/static/dashboard/v2/components/primitives/KpiTile.jsx',
      '/static/dashboard/v2/components/primitives/TimeframeSelector.jsx',
      '/static/dashboard/v2/components/portfolio/PipelineStatus.jsx',
      '/static/dashboard/v2/components/portfolio/KpiRow.jsx',
      '/static/dashboard/v2/components/portfolio/EquityTimeline.jsx',
      '/static/dashboard/v2/components/portfolio/PnLTicks.jsx',
      '/static/dashboard/v2/components/portfolio/MarketPriceOverlay.jsx',
      '/static/dashboard/v2/components/portfolio/TradeList.jsx',
      '/static/dashboard/v2/components/portfolio/AllocationBar.jsx',
      '/static/dashboard/v2/LivePortfolio.jsx',
    ];

    let combined = '';
    for (const f of v2Files) {
      try {
        const text = await fetch(f).then(r => r.ok ? r.text() : Promise.reject('HTTP ' + r.status));
        combined += '\n// ===== ' + f + ' =====\n;(function(){\n' + text + '\n})();\n';
      } catch (e) {
        console.error('[v2-lab] failed to load ' + f, e);
      }
    }

    const code = Babel.transform(combined, { presets: ['react'], filename: 'v2-lab.jsx' }).code;
    new Function(code)();
    console.log('[v2-lab] ✓ V2 overlay loaded');
  } catch (e) {
    console.error('[v2-lab] init failed:', e);
  }
})();
</script>
</body>
</html>
