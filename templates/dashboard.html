<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POYBOT // POLYMARKET TRADING TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #070809; color: #c4ccd8; font-family: 'JetBrains Mono','Menlo','Consolas',monospace; font-size: 12px; line-height: 1.4; overflow: hidden; -webkit-font-smoothing: antialiased; }
  #root { height: 100vh; display: flex; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #070809; }
  ::-webkit-scrollbar-thumb { background: #252d3e; }
  input, select, button, textarea { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #c4ccd8; }
  input::placeholder { color: #6b7a94; }
  select option { background: #101318; }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.012); }
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#6b7a94;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;">
    <div style="color:#e8a020;font-weight:700;font-size:13px;">POLYMARKET TRADING BOT</div>
    <div>LOADING INTERFACE…</div>
  </div>
</div>

<!-- Poybot live data client (plain JS, runs synchronously) -->
<script src="api-client.js"></script>

<!-- Load, combine and Babel-transform the three JSX modules in order -->
<script>
(async function () {
  const root = document.getElementById('root');

  function showError(msg) {
    root.innerHTML =
      '<pre style="color:#c93545;padding:24px;font-size:11px;white-space:pre-wrap;font-family:monospace">LOAD ERROR:\n' +
      msg + '</pre>';
  }

  try {
    // Each file is wrapped in its own IIFE so local `const` declarations
    // don't collide between modules. They communicate via window.
    const files = [
      'dashboard-components.jsx',
      'dashboard-tabs.jsx',
      'dashboard-app.jsx',
    ];

    let combined = '';
    for (const f of files) {
      let text;
      try {
        const res = await fetch(f);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        text = await res.text();
      } catch (e) {
        throw new Error('Failed to load ' + f + ': ' + e.message);
      }
      combined += '\n// ===== ' + f + ' =====\n;(function(){\n' + text + '\n})();\n';
    }

    let code;
    try {
      code = Babel.transform(combined, { presets: ['react'], filename: 'app.jsx' }).code;
    } catch (e) {
      throw new Error('Babel transform failed:\n' + e.message);
    }

    // eslint-disable-next-line no-new-func
    new Function(code)();

  } catch (e) {
    console.error('[Poybot] load error:', e);
    showError(e.message || String(e));
  }
})();
</script>
</body>
</html>
