services:
  postgres:
    image: postgres:15
    container_name: polymarket_db
    environment:
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket_dev_password
      POSTGRES_DB: polymarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket -d polymarket"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: polymarket_redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # dashboard service commented out - run API directly with:
  # python -m uvicorn src.api.main:app --host 127.0.0.1 --port 8000
  # dashboard:
  #   build: .
  #   command: uvicorn src.api.main:app --host 0.0.0.0 --port 8080 --reload
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     - postgres
  #     - redis
  #   env_file: .env

volumes:
  postgres_data:
  redis_data:
