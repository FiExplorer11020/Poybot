# --------------------------------------------------------------------------- #
# docker-compose.yml (S4.11) — local dev + base spec for prod.                 #
#                                                                              #
# Layout                                                                       #
#   postgres + redis  : managed by us, persistent volumes.                     #
#   observer          : WebSocket → trade ingestion + position tracker.        #
#   engine            : confidence engine + paper trader + telegram bot +      #
#                       APScheduler (nightly batch, killswitch sync, redis     #
#                       cleanup) + watchdog.                                   #
#   registry          : Falcon-driven leader registry refresh loop.            #
#   api               : FastAPI dashboard + /health + /healthz. Optional.      #
#                                                                              #
# Build                                                                        #
#   docker compose build                                                       #
#                                                                              #
# Run                                                                          #
#   docker compose up -d postgres redis           # backend only               #
#   docker compose up -d                          # everything                 #
#                                                                              #
# Prod overlay                                                                 #
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d      #
# --------------------------------------------------------------------------- #

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  image: polymarket-bot:latest
  env_file: .env
  environment:
    # The bot reaches Redis/DB by service name on the compose network,
    # not localhost. Override what's in .env.
    DATABASE_URL: postgresql://polymarket:polymarket_dev_password@postgres:5432/polymarket
    REDIS_URL: redis://redis:6379/0
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  # Default healthcheck — overridable per service.
  healthcheck:
    test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
    interval: 30s
    timeout: 5s
    start_period: 20s
    retries: 3

services:
  postgres:
    image: postgres:15
    container_name: polymarket_db
    environment:
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket_dev_password
      POSTGRES_DB: polymarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket -d polymarket"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: polymarket_redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ------------------------------------------------------------------------- #
  # Application services                                                       #
  # ------------------------------------------------------------------------- #

  observer:
    <<: *app-base
    container_name: polymarket_observer
    command: ["python", "-m", "src.observer.main"]
    # Observer holds long-lived WebSocket connections — give it a longer
    # cold-start grace.
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  engine:
    <<: *app-base
    container_name: polymarket_engine
    command: ["python", "-m", "src.engine.main"]
    # Engine boots scheduler + watchdog + telegram + 4 long-running
    # components — give it 60s before the first probe.
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  registry:
    <<: *app-base
    container_name: polymarket_registry
    command: ["python", "-m", "src.registry.main"]

  # Daily Postgres → Cloudflare R2 backup (S4.12). Idle when
  # BACKUPS_ENABLED=false (default). Reads R2_* + DATABASE_URL from
  # .env. The pg_dump binary is installed via postgresql-client in
  # the Dockerfile runtime stage.
  backups:
    <<: *app-base
    container_name: polymarket_backups
    command: ["python", "-m", "src.backups.main"]
    # Backups doesn't need Redis but keeps the same dependency list
    # so the restart policy + healthcheck stay coherent. Override
    # env DATABASE_URL since pg_dump runs from this container against
    # the postgres service.
    healthcheck:
      # Light healthcheck — just verifies the python process is up
      # and pg_dump binary is reachable. Full Redis+DB probe is
      # overkill for an idle nightly job.
      test: ["CMD", "sh", "-c", "pg_dump --version >/dev/null && echo ok"]
      interval: 60s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── R6 The Spine — data sovereignty daemons ────────────────────────────
  # On-chain CLOB event ingestion via Alchemy Polygon Mainnet WSS.
  # Requires ALCHEMY_RPC_URL / RPC_PROVIDER_URLS in .env.
  onchain:
    <<: *app-base
    container_name: polymarket_onchain
    command: ["python", "-m", "src.onchain.main"]
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 60s
      timeout: 5s
      start_period: 45s
      retries: 3

  # Wallet universe crawler (2000+ wallets) — depth_tier maintenance.
  crawler:
    <<: *app-base
    container_name: polymarket_crawler
    command: ["python", "-m", "src.crawler.main"]
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Event-driven Falcon refresher (R6 — replaces fixed cron polling).
  falcon_refresher:
    <<: *app-base
    container_name: polymarket_falcon_refresher
    command: ["python", "-m", "src.registry.refresher_main"]
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── R13 The Mirror — calibration daemon ────────────────────────────────
  # Nightly batch: replays yesterday's decisions, computes per-model loss,
  # detects drift, auto-disables models exceeding z-threshold for 3+ days.
  calibration:
    <<: *app-base
    container_name: polymarket_calibration
    command: ["python", "-m", "src.calibration"]
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 120s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Sprint 2 daemons (R8 / R9 / R10) ───────────────────────────────────
  # Defined here so `docker compose config` validates them, but gated
  # behind the `sprint2` profile so a vanilla `docker compose up -d`
  # does NOT spawn them. Sprint 2 activates them with:
  #   docker compose --profile sprint2 up -d \
  #     strategy_classifier follower_volume causal
  # Each daemon degrades gracefully on empty inputs (R8 falls back to
  # the uniform-prior dummy when models/strategy_classifier.pkl is
  # missing; R9 + R10 only run nightly batches and sleep otherwise).

  # R8 — The Lens. Periodic strategy classification of tier-0/1 wallets.
  # Refreshes every STRATEGY_CLASSIFIER_REFRESH_INTERVAL_H hours.
  strategy_classifier:
    <<: *app-base
    profiles: ["sprint2"]
    container_name: polymarket_strategy_classifier
    command: ["python", "-m", "src.strategy_classifier"]
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 120s
      timeout: 5s
      start_period: 60s
      retries: 3

  # R9 — The Web. Nightly multivariate Hawkes fit at MVHAWKES_BATCH_HOUR_UTC.
  follower_volume:
    <<: *app-base
    profiles: ["sprint2"]
    container_name: polymarket_follower_volume
    command: ["python", "-m", "src.follower_volume"]
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 120s
      timeout: 5s
      start_period: 60s
      retries: 3

  # R10 — The Truth Test. Nightly 2SLS fit at CAUSAL_DAEMON_BATCH_HOUR_UTC.
  # Shadow mode strict: causal_gating_enabled=false in Sprint 2.
  causal:
    <<: *app-base
    profiles: ["sprint2"]
    container_name: polymarket_causal
    command: ["python", "-m", "src.causal"]
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 120s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ----------------------------------------------------------------- #
  # Sprint 3 — Enrichments (R11 + R12 + R7).                          #
  # All under `--profile sprint3`. Activate with                       #
  #   docker compose --profile sprint3 up -d --no-deps <service>       #
  # `--no-deps` mandatory to avoid the db/redis cascade-recreate that  #
  # bit us at Sprint 2 deploy (cf. EXECUTION_PLAN § 14 deviation #4).  #
  # ----------------------------------------------------------------- #

  # R11 — The Microscope. CLOB Book L3 firehose. Subscribes to
  # Polymarket WS at order-event granularity, pushes events to the
  # Redis Stream `book:events:stream`. In rollup-only mode
  # (CLOB_BOOK_PERSIST_RAW=False, default) the raw clob_book_events
  # rows are NOT persisted — only the per-minute rollups via the
  # `microstructure` daemon below. Saves ~13 GB/day disk.
  book_l3:
    <<: *app-base
    profiles: ["sprint3"]
    container_name: polymarket_book_l3
    command: ["python", "-m", "src.observer.clob_book_main"]
    environment:
      DATABASE_URL: postgresql://polymarket:polymarket_dev_password@postgres:5432/polymarket
      REDIS_URL: redis://redis:6379/0
      CLOB_BOOK_PERSIST_RAW: "false"
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 60s
      timeout: 5s
      start_period: 60s
      retries: 3

  # R11 — The Microscope. Microstructure feature deriver. Consumes the
  # book:events:stream Redis Stream produced by `book_l3` and writes
  # per-minute rollups to `microstructure_features` (iceberg/spoof/OFI/
  # place-to-fill/cancel-to-fill metrics). ~100 MB/day disk.
  microstructure:
    <<: *app-base
    profiles: ["sprint3"]
    container_name: polymarket_microstructure
    command: ["python", "-m", "src.microstructure"]
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 120s
      timeout: 5s
      start_period: 60s
      retries: 3

  # R12 — The Periphery (social half). X firehose + Telegram +
  # Discord listeners + NLP intent classifier. Stub mode when
  # X_API_KEY="" (default in Sprint 3 — no budget for $100/mo X API):
  # the daemon stays up, exposes a healthcheck, but ingests zero
  # tweets. Spec § 12 hors-scope hardcodes X_API_KEY="".
  social:
    <<: *app-base
    profiles: ["sprint3"]
    container_name: polymarket_social
    command: ["python", "-m", "src.social"]
    environment:
      DATABASE_URL: postgresql://polymarket:polymarket_dev_password@postgres:5432/polymarket
      REDIS_URL: redis://redis:6379/0
      X_API_KEY: ""
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 120s
      timeout: 5s
      start_period: 60s
      retries: 3

  # R12 — The Periphery (cross-market half). Polls Manifold +
  # PredictIt for wallet/position cross-references. Kalshi disabled
  # (KALSHI_API_KEY=""). The wallet_resolver matches across venues so
  # an R8 strategy classifier can spot leaders running multi-venue
  # arbitrage. Memory: ~200 MB.
  crossmarket:
    <<: *app-base
    profiles: ["sprint3"]
    container_name: polymarket_crossmarket
    command: ["python", "-m", "src.cross_market"]
    environment:
      DATABASE_URL: postgresql://polymarket:polymarket_dev_password@postgres:5432/polymarket
      REDIS_URL: redis://redis:6379/0
      KALSHI_API_KEY: ""
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 120s
      timeout: 5s
      start_period: 60s
      retries: 3

  # R7 — Sprint 3.5 mempool watcher (EXECUTION_PLAN § 4 Décision #5).
  # Re-aimed at the observer's `trades:observed` pub/sub channel via
  # `LeaderTradeSubscription`. Stays in shadow mode
  # (PREFILL_LIVE_ENABLED=false) — paper trades only — until the soak
  # proves the synthetic-intent path is stable.
  mempool:
    <<: *app-base
    profiles: ["sprint3"]
    container_name: polymarket_mempool
    command: ["python", "-m", "src.mempool"]
    environment:
      DATABASE_URL: postgresql://polymarket:polymarket_dev_password@postgres:5432/polymarket
      REDIS_URL: redis://redis:6379/0
      PREFILL_LIVE_ENABLED: "false"
      MEMPOOL_SUBSCRIPTION_MODE: "polymarket_ws_proxy"
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 60s
      timeout: 5s
      start_period: 60s
      retries: 3

  # FastAPI dashboard + health endpoints. Disabled by default in dev —
  # uncomment ports to expose.
  api:
    <<: *app-base
    container_name: polymarket_api
    command:
      - "python"
      - "-m"
      - "uvicorn"
      - "src.api.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
    ports:
      - "8080:8080"
    healthcheck:
      # API has its own /healthz endpoint — prefer that over the
      # generic Redis+DB probe.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
  redis_data:
