# --------------------------------------------------------------------------- #
# Production overlay (S4.11).                                                  #
#                                                                              #
# Usage                                                                        #
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d      #
#                                                                              #
# Targets the Oracle Cloud Free tier (Ampere A1 — 4 vCPU / 24 GB RAM           #
# shared with the rest of the box, but we self-cap at ~1.5 GB for the          #
# whole stack to leave headroom).                                              #
#                                                                              #
# Memory budget                                                                #
#   postgres : 300 MB                                                          #
#   redis    :  64 MB                                                          #
#   observer : 300 MB                                                          #
#   engine   : 600 MB  (jax/lightgbm load lazily for nightly batch)            #
#   registry : 200 MB                                                          #
#   api      : 200 MB                                                          #
#   ──────────                                                                 #
#   total    : ~1.66 GB                                                        #
# --------------------------------------------------------------------------- #

services:
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    # Tuned for the R6-R13 schema (21 new tables, partitioned book events
    # in R11, JSONB-heavy Hawkes/causal blobs). The previous 300 M cgroup
    # cap caused systemic OOM-kills under load (postgres consistently at
    # 99 % of limit). Bumped to 1 G with proportionally larger buffers.
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_connections=25
      -c effective_cache_size=512MB
      -c checkpoint_completion_target=0.9
    deploy:
      resources:
        limits:
          memory: 1024M
    # Don't expose Postgres on the public network — only reachable via
    # the compose bridge.
    ports: !reset []

  redis:
    restart: unless-stopped
    # 128 MB anticipates R7 mempool stream, R11 book:events stream, R12
    # social streams. Previous 64 MB had Redis at 53 % already.
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 160M
    ports: !reset []

  observer:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 350M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  engine:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # +100 M headroom for R8 strategy classifier load + R9 mvHawkes
          # nightly fit (peak transient).
          memory: 700M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  registry:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  api:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # +100 M for the R6-R13 endpoint surface + v2 dashboard SQL.
          memory: 300M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backups:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # 200M is plenty: pg_dump streams ~50 MB compressed, boto3
          # buffers an 8 MB part. Spike room for 2× during upload.
          memory: 200M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── R6 Spine daemons ────────────────────────────────────────────────
  onchain:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 250M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  crawler:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  falcon_refresher:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── R13 Calibration daemon ──────────────────────────────────────────
  calibration:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Nightly batch only — 300M handles the bootstrap historical
          # backfill across 4 models. Steady-state usage is ~80M.
          memory: 300M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
