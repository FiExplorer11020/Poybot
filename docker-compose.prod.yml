# --------------------------------------------------------------------------- #
# Production overlay (S4.11).                                                  #
#                                                                              #
# Usage                                                                        #
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d      #
#                                                                              #
# Targets the Oracle Cloud Free tier (Ampere A1 — 4 vCPU / 24 GB RAM           #
# shared with the rest of the box, but we self-cap at ~1.5 GB for the          #
# whole stack to leave headroom).                                              #
#                                                                              #
# Memory budget                                                                #
#   postgres : 300 MB                                                          #
#   redis    :  64 MB                                                          #
#   observer : 300 MB                                                          #
#   engine   : 600 MB  (jax/lightgbm load lazily for nightly batch)            #
#   registry : 200 MB                                                          #
#   api      : 200 MB                                                          #
#   ──────────                                                                 #
#   total    : ~1.66 GB                                                        #
# --------------------------------------------------------------------------- #

services:
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=20
      -c effective_cache_size=128MB
      -c checkpoint_completion_target=0.9
    deploy:
      resources:
        limits:
          memory: 300M
    # Don't expose Postgres on the public network — only reachable via
    # the compose bridge.
    ports: !reset []

  redis:
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 64M
    ports: !reset []

  observer:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  engine:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 600M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  registry:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  api:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backups:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # 200M is plenty: pg_dump streams ~50 MB compressed, boto3
          # buffers an 8 MB part. Spike room for 2× during upload.
          memory: 200M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
